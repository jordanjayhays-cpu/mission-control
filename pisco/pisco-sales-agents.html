<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PISCO Sales Agents — Pipeline</title>
  <style>
    :root { --bg: #0a0e17; --card: #111827; --border: #1e2d40; --text: #e2e8f0; --muted: #64748b; --accent: #3b82f6; --green: #10b981; --yellow: #f59e0b; --red: #ef4444; --purple: #8b5cf6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    .header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .badge { background: var(--accent); color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 12px; }
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-btn:hover { border-color: var(--accent); }
    .search-box { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 14px; width: 260px; }
    .search-box::placeholder { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .title { color: var(--muted); font-size: 13px; }
    .country-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
    .country-NL { background: #001f3f; color: #fff; }
    .country-DE { background: #7f0000; color: #fff; }
    .country-BE { background: #333; color: #fff; }
    .country-IE { background: #169b62; color: #fff; }
    .country-HR { background: #1a1a4e; color: #fff; }
    .country-LT { background: #0d3b66; color: #fff; }
    .country-OTHER { background: var(--border); color: var(--muted); }
    .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin: 2px; }
    .tag-logistics { background: #065f46; color: var(--green); }
    .tag-bluecollar { background: #7c2d12; color: #fb923c; }
    .tag-commission { background: #1e1b4b; color: var(--purple); }
    .tag-b2b { background: #1e3a5f; color: #60a5fa; }
    .tag-hr { background: #3f3f46; color: var(--text); }
    .meta { display: flex; gap: 16px; margin: 12px 0; font-size: 12px; color: var(--muted); }
    .meta span { display: flex; align-items: center; gap: 4px; }
    .linkedin-btn { display: inline-flex; align-items: center; gap: 6px; background: #0077b5; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; text-decoration: none; margin-top: 8px; }
    .linkedin-btn:hover { background: #006399; }
    .status-row { display: flex; gap: 8px; margin-top: 12px; }
    .status-btn { flex: 1; padding: 6px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
    .status-contacted { background: #1e3a5f; color: #60a5fa; }
    .status-qualified { background: #1a3a2a; color: var(--green); }
    .status-hired { background: #3f1d5c; color: var(--purple); }
    .status-pass { background: #2a1a1a; color: var(--red); }
    .notes { margin-top: 12px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
    .notes textarea { width: 100%; background: transparent; border: none; color: var(--text); font-size: 12px; resize: none; outline: none; }
    .section-title { font-size: 14px; color: var(--muted); margin: 24px 0 12px; text-transform: uppercase; letter-spacing: 1px; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-label { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .stat-card.green { border-color: #065f46; }
    .stat-card.green .stat-num { color: var(--green); }
    .stat-card.yellow { border-color: #78350f; }
    .stat-card.yellow .stat-num { color: var(--yellow); }
    .stat-card.purple { border-color: #3b1d5c; }
    .stat-card.purple .stat-num { color: var(--purple); }
    .export-btn { background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .export-btn:hover { opacity: 0.9; }
    @media(max-width: 768px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>🧑‍💼 PISCO Sales Agents</h1>
      <p>Commission-based sales people to sell Placewell services in Europe</p>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <span class="badge">30 Agents Found</span>
      <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num">6</div><div class="stat-label">Netherlands</div></div>
    <div class="stat-card green"><div class="stat-num">8</div><div class="stat-label">Germany</div></div>
    <div class="stat-card yellow"><div class="stat-num">7</div><div class="stat-label">Belgium</div></div>
    <div class="stat-card purple"><div class="stat-num">9</div><div class="stat-label">Other Countries</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterAll()">All (30)</button>
    <button class="filter-btn" onclick="filterCountry('NL')">🇳🇱 NL (6)</button>
    <button class="filter-btn" onclick="filterCountry('DE')">🇩🇪 DE (8)</button>
    <button class="filter-btn" onclick="filterCountry('BE')">🇧🇪 BE (7)</button>
    <button class="filter-btn" onclick="filterCountry('IE')">🇮🇪 IE (4)</button>
    <button class="filter-btn" onclick="filterCountry('LT')">🇱🇹 LT (3)</button>
    <button class="filter-btn" onclick="filterCountry('HR')">🇭🇷 HR (2)</button>
    <button class="filter-btn" onclick="filterTag('logistics')">📦 Logistics</button>
    <button class="filter-btn" onclick="filterTag('commission')">💰 Commission</button>
    <button class="filter-btn" onclick="filterTag('bluecollar')">🔧 Blue Collar</button>
  </div>
  <input type="text" class="search-box" placeholder="Search name, company, sector..." oninput="search(this.value)">

  <div class="section-title">HIGH PRIORITY</div>
  <div class="grid" id="agents"></div>
</div>

<script>
const agents = [
  { id: 1, name: "Karen Marwitz", title: "Independent Recruiter / Headhunter", company: "Self-employed", country: "NL", sector: "logistics", tags: ["logistics","bluecollar"], linkedin: "https://nl.linkedin.com/in/kmarwitz", notes: "SPECIALIST in logistics — perfect for PISCO transport/logistics sector", status: "new" },
  { id: 2, name: "Johan Gemels", title: "Independent Sales Agent", company: "EUROWAGON", country: "BE", sector: "logistics", tags: ["logistics","b2b"], linkedin: "https://be.linkedin.com/in/johan-gemels-12418114", notes: "Active in logistics — could represent PISCO in Belgium", status: "new" },
  { id: 3, name: "Sabrina Shortt", title: "Freelance Recruitment Consultant", company: "Self-employed", country: "IE", sector: "commission", tags: ["commission","hr"], linkedin: "https://ie.linkedin.com/in/sabrina-shortt-8bb842148", notes: "Works on commission basis — ideal model for PISCO", status: "new" },
  { id: 4, name: "Rareș A.", title: "Headhunter | Recruiter", company: "Freelance", country: "DE", sector: "bluecollar", tags: ["bluecollar","hr"], linkedin: "https://de.linkedin.com/in/arl", notes: "Blue collar recruitment — relevant for meat processing, construction", status: "new" },
  { id: 5, name: "Olivier Goossens", title: "Commercial Manager", company: "ECO-LOGISTIC", country: "BE", sector: "logistics", tags: ["logistics","b2b"], linkedin: "https://be.linkedin.com/in/olivier-goossens-a9139b31", notes: "Commercial manager at ECO-LOGISTIC — logistics connections", status: "new" },
  { id: 6, name: "Marleen Coppens", title: "Freelance HR Consultant", company: "Freelance", country: "BE", sector: "hr", tags: ["hr","bluecollar"], linkedin: "https://be.linkedin.com/in/marleencoppens", notes: "Multi-country HR consultant with cross-border experience", status: "new" },
  { id: 7, name: "Callum Kennedy", title: "Commission Sales Associate", company: "Self-employed", country: "IE", sector: "commission", tags: ["commission","b2b"], linkedin: "https://ie.linkedin.com/in/callum-kennedy-632a703a9", notes: "Currently commission-only — open to similar arrangements", status: "new" },
  { id: 8, name: "Robin Aeissing", title: "Independent Recruiter", company: "APPLY Recruitment", country: "NL", sector: "hr", tags: ["hr"], linkedin: "https://nl.linkedin.com/in/robinaeissing", notes: "", status: "new" },
  { id: 9, name: "Erik R.", title: "Freelance Sales Closer", company: "Freelance", country: "NL", sector: "b2b", tags: ["b2b"], linkedin: "https://nl.linkedin.com/in/erik-r-842568224", notes: "", status: "new" },
  { id: 10, name: "Roger van den Heuvel", title: "Interim Sales Manager / ZZP", company: "Freelance", country: "NL", sector: "b2b", tags: ["b2b"], linkedin: "https://nl.linkedin.com/in/heuvelvandenroger", notes: "ZZP = zelfstandige zonder personeel (Dutch freelancer)", status: "new" },
  { id: 11, name: "Uwe Prasse", title: "Senior IT Sales Recruiter", company: "Self-employed", country: "DE", sector: "hr", tags: ["hr","b2b"], linkedin: "https://de.linkedin.com/in/uwe-prasse-b66377", notes: "Dusseldorf based", status: "new" },
  { id: 12, name: "Max von Waberer", title: "Interim Recruiter", company: "Freelance", country: "DE", sector: "hr", tags: ["hr"], linkedin: "https://de.linkedin.com/in/berlintechrecruiter", notes: "Berlin based", status: "new" },
  { id: 13, name: "Yuri Goldberg", title: "B2B Recruiter", company: "Self-employed", country: "DE", sector: "b2b", tags: ["b2b","hr"], linkedin: "https://de.linkedin.com/in/yuri-goldberg-89836919a", notes: "Berlin", status: "new" },
  { id: 14, name: "Philip Huys", title: "Independent Sales Consultant", company: "Self-employed", country: "BE", sector: "b2b", tags: ["b2b"], linkedin: "https://be.linkedin.com/in/philiphuys", notes: "", status: "new" },
  { id: 15, name: "Philippe F. Durieux", title: "Independent Consultant", company: "Freelance", country: "BE", sector: "b2b", tags: ["b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 16, name: "Mieke De Saedeleer", title: "Independent Consultant", company: "Freelance", country: "BE", sector: "b2b", tags: ["b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 17, name: "Giuliano Carli", title: "Procurement / Supply Chain", company: "Independent", country: "BE", sector: "logistics", tags: ["logistics","b2b"], linkedin: "#", notes: "Supply chain expertise", status: "new" },
  { id: 18, name: "Steven Gleeson", title: "Headhunter", company: "PRC Headhunting", country: "IE", sector: "hr", tags: ["hr"], linkedin: "https://ie.linkedin.com/in/stevengleeson", notes: "", status: "new" },
  { id: 19, name: "Darragh Mac Gearailt", title: "Head of Sales", company: "Recruitment Agency", country: "IE", sector: "hr", tags: ["hr","b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 20, name: "Henar Cabrera", title: "Senior Recruitment Consultant", company: "Agency", country: "IE", sector: "hr", tags: ["hr"], linkedin: "#", notes: "", status: "new" },
  { id: 21, name: "Alan Osborne", title: "Recruiter", company: "Independent", country: "IE", sector: "hr", tags: ["hr","b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 22, name: "Brian C.", title: "Founder / Principal Recruiter", company: "Self-employed", country: "DE", sector: "hr", tags: ["hr","b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 23, name: "Usama Zabair", title: "Recruitment Consultant", company: "Self-employed", country: "DE", sector: "hr", tags: ["hr"], linkedin: "#", notes: "", status: "new" },
  { id: 24, name: "Kristine Heinrichs", title: "B2B Insight Recruiter", company: "Self-employed", country: "DE", sector: "b2b", tags: ["b2b"], linkedin: "#", notes: "", status: "new" },
  { id: 25, name: "Voodoo Sales", title: "Headhunting Agency", company: "Voodoo Sales", country: "LT", sector: "hr", tags: ["hr","bluecollar"], linkedin: "https://voodoosales.lt/en/", notes: "Lithuanian headhunting agency", status: "new" },
  { id: 26, name: "Valentis", title: "Freelance Sales Agent", company: "Hiring", country: "LT", sector: "b2b", tags: ["commission"], linkedin: "#", notes: "Actively hiring freelance sales agents", status: "new" },
  { id: 27, name: "Enlito", title: "International Recruitment", company: "Agency", country: "LT", sector: "hr", tags: ["hr","bluecollar"], linkedin: "#", notes: "Multi-country recruitment", status: "new" },
  { id: 28, name: "TalentWorldGroup", title: "Croatian Pre-Sales Rep", company: "Freelance", country: "HR", sector: "b2b", tags: ["commission"], linkedin: "#", notes: "", status: "new" },
  { id: 29, name: "EURES", title: "Freelance Sales Agents Program", company: "EU-wide", country: "HR", sector: "b2b", tags: ["commission"], linkedin: "#", notes: "European Job Days — freelance sales agents program", status: "new" },
  { id: 30, name: "Sian Venter", title: "Recruitment Consultant", company: "Balance Talent Acquisition", country: "NL", sector: "hr", tags: ["hr"], linkedin: "#", notes: "", status: "new" },
];

let filter = { country: null, tag: null, search: "" };

function countryFlag(c) {
  const f = { NL: "🇳🇱", DE: "🇩🇪", BE: "🇧🇪", IE: "🇮🇪", LT: "🇱🇹", HR: "🇭🇷" };
  return f[c] || "🌍";
}

function render() {
  let a = agents.filter(e => {
    if (filter.country && e.country !== filter.country) return false;
    if (filter.tag && !e.tags.includes(filter.tag)) return false;
    if (filter.search) {
      const s = filter.search.toLowerCase();
      if (!e.name.toLowerCase().includes(s) && !e.title.toLowerCase().includes(s) && !e.company.toLowerCase().includes(s)) return false;
    }
    return true;
  });
  document.getElementById("agents").innerHTML = a.map(e => `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="name">${e.name}</div>
          <div class="title">${e.title}${e.company ? " @ " + e.company : ""}</div>
        </div>
        <span class="country-badge country-${e.country}">${countryFlag(e.country)} ${e.country}</span>
      </div>
      <div class="meta">
        <span>📦 ${e.sector}</span>
      </div>
      <div>
        ${e.tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join("")}
      </div>
      ${e.notes ? `<div class="notes"><textarea placeholder="Add notes..." rows="2" onblur="saveNotes(${e.id}, this.value)">${e.notes || ""}</textarea></div>` : ""}
      <div style="margin-top:12px">
        <a href="${e.linkedin}" target="_blank" class="linkedin-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
          View Profile
        </a>
      </div>
      <div class="status-row">
        <button class="status-btn status-contacted" onclick="setStatus(${e.id}, 'contacted')">📧 Contacted</button>
        <button class="status-btn status-qualified" onclick="setStatus(${e.id}, 'qualified')">✅ Qualified</button>
        <button class="status-btn status-hired" onclick="setStatus(${e.id}, 'hired')">🤝 Hired</button>
      </div>
    </div>
  `).join("");
}

function filterAll() { filter = { country: null, tag: null, search: filter.search }; updateButtons(); render(); }
function filterCountry(c) { filter = { country: c, tag: null, search: filter.search }; updateButtons(); render(); }
function filterTag(t) { filter = { country: null, tag: t, search: filter.search }; updateButtons(); render(); }
function search(v) { filter.search = v; render(); }

function updateButtons() {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
}

function setStatus(id, status) {
  const a = agents.find(e => e.id === id);
  if (a) a.status = status;
  localStorage.setItem("pisco-agents", JSON.stringify(agents));
  render();
}

function saveNotes(id, notes) {
  const a = agents.find(e => e.id === id);
  if (a) a.notes = notes;
  localStorage.setItem("pisco-agents", JSON.stringify(agents));
}

function exportCSV() {
  const rows = [["Name","Title","Company","Country","Sector","Tags","LinkedIn","Notes","Status"]];
  agents.forEach(e => {
    rows.push([e.name, e.title, e.company, e.country, e.sector, e.tags.join(";"), e.linkedin, e.notes || "", e.status]);
  });
  const csv = rows.map(r => r.map(c => `"${(c||"").replace(/"/g,'""')}"`).join(",")).join("
");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "pisco-sales-agents.csv"; a.click();
}

// Load saved state
const saved = localStorage.getItem("pisco-agents");
if (saved) {
  const savedAgents = JSON.parse(saved);
  savedAgents.forEach(sa => { const a = agents.find(e => e.id === sa.id); if (a) Object.assign(a, sa); });
}

render();
</script>
</body>
</html>
