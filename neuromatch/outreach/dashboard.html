<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neurotech Outreach Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; }
h1 { color: #4ade80; font-size: 20px; margin-bottom: 20px; }
.toolbar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.toolbar span { color: #666; font-size: 13px; }
.filter-btn {
  background: #1a1a2e; border: 1px solid #2a2a4a; color: #888; padding: 6px 14px;
  border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.15s;
}
.filter-btn:hover { border-color: #4ade80; color: #4ade80; }
.filter-btn.active { background: #4ade80; color: #0a0a0f; border-color: #4ade80; }
.card {
  background: #11111a; border: 1px solid #1e1e32; border-radius: 10px;
  margin-bottom: 12px; overflow: hidden; transition: border-color 0.15s;
}
.card:hover { border-color: #2a2a4a; }
.card-header {
  padding: 14px 16px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: flex-start; gap: 12px;
}
.card-header:hover { background: #14141f; }
.company { font-size: 15px; font-weight: 600; color: #fff; }
.meta { font-size: 12px; color: #666; margin-top: 4px; display: flex; gap: 12px; flex-wrap: wrap; }
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.tag-pending { background: #1e1e32; color: #666; }
.tag-sent { background: #1a3a2a; color: #4ade80; }
.tag-replied { background: #2a3a1a; color: #7ade4a; }
.tag-done { background: #1a2a3a; color: #4abade; }
.tag-israel { background: #2a1a3a; color: #ad4a8a; }
.tag-spain { background: #2a2a1a; color: #ad8a4a; }
.tag-sweden { background: #1a2a3a; color: #4a8aad; }
.card-body { display: none; padding: 0 16px 16px; border-top: 1px solid #1e1e32; }
.card-body.open { display: block; }
.email-block {
  background: #0d0d18; border: 1px solid #1e1e32; border-radius: 8px;
  padding: 14px; margin-top: 12px; font-size: 13px; line-height: 1.7;
  white-space: pre-wrap; color: #b0b0c0;
}
.email-block .subject { color: #4ade80; font-weight: 600; margin-bottom: 10px; font-size: 13px; }
.email-block .contact { margin-top: 10px; font-size: 12px; color: #555; }
.actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.action-btn {
  background: #1a1a2e; border: 1px solid #2a2a4a; color: #888;
  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.action-btn:hover { border-color: #4ade80; color: #4ade80; }
.action-btn.replied { border-color: #7ade4a; color: #7ade4a; }
.action-btn.done { border-color: #4abade; color: #4abade; }
.stats {
  background: #11111a; border: 1px solid #1e1e32; border-radius: 10px;
  padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 24px; flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: #fff; }
.stat-label { font-size: 11px; color: #666; text-transform: uppercase; margin-top: 2px; }
.no-results { color: #444; text-align: center; padding: 40px; font-size: 14px; }
.section-label { color: #444; font-size: 11px; text-transform: uppercase; margin: 16px 0 8px; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>🧠 Neurotech Outreach Dashboard</h1>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-num" id="s-pending">0</div><div class="stat-label">Pending</div></div>
  <div class="stat"><div class="stat-num" id="s-sent">0</div><div class="stat-label">Sent</div></div>
  <div class="stat"><div class="stat-num" id="s-replied">0</div><div class="stat-label">Replied</div></div>
  <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
</div>

<div class="toolbar">
  <span>Status:</span>
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="pending">Pending</button>
  <button class="filter-btn" data-filter="sent">Sent</button>
  <button class="filter-btn" data-filter="replied">Replied</button>
  <button class="filter-btn" data-filter="done">Done</button>
  <span style="margin-left:12px">Country:</span>
  <button class="filter-btn active" data-country="all">All</button>
  <button class="filter-btn" data-country="Israel">🇮🇱 Israel</button>
  <button class="filter-btn" data-country="Spain">🇪🇸 Spain</button>
  <button class="filter-btn" data-country="Sweden">🇸🇪 Sweden</button>
</div>

<div id="cards"></div>

<script>
const DATA = [{"company_name": "INBRAIN Neuroelectronics", "company_country": "Spain", "company_website": "https://inbrainneuro.com", "contact_name": "Carola Aguilar", "contact_email": "carola@inbrainneuro.com", "contact_phone": "+34 625 411 406", "subject_line": "US market entry partnership \u2014 INBRAIN Neuroelectronics", "status": "pending", "sent_date": null, "reply_date": null, "notes": "$50M Series B (June 2024). BCI for neural mapping. Spain-based. CEO explicit US clinical expansion signals.", "funding": "$50M Series B", "product": "BCI / neural mapping", "fda_status": "None", "us_signals": "Clinical trials in US expected", "last_contacted": "2026-05-26", "email_body": "Subject: US market entry partnership \u2014 INBRAIN Neuroelectronics\n\nHi Carola,\n\nINBRAIN just closed a $50M Series B \u2014 that's a serious signal you're heading toward US commercialization. Most EU neurotech companies underestimate how different the US clinical and reimbursement landscape is, especially for BCI devices.\n\nI'm a US-native MBA based in Madrid. I help neurotech companies like yours navigate US market entry \u2014 from regulatory strategy to distribution channel setup. I also run an AI-powered outbound system that identifies exactly which US hospital systems, research centers, and payers are actively looking for what you're building.\n\nThe $5K question: what's your US market entry timeline, and are you actively evaluating distribution partners?\n\nHappy to show you exactly how I'd approach INBRAIN's US push \u2014 Happy to jump on a 20-min call this week.\n\nBest,\nJordan Hays\nUS Market Entry Consultant | MBA | Madrid-based\n"}, {"company_name": "BrainQ", "company_country": "Israel", "company_website": "https://brainqtech.com", "contact_name": "Yotam Drechsler", "contact_email": "yotam@brainqtech.com", "contact_phone": "+972 73-212-2300", "subject_line": "US market entry partnership \u2014 BrainQ", "status": "pending", "sent_date": null, "reply_date": null, "notes": "$48.8M Series B. AI-based BCI for stroke recovery. US FDA breakthrough designation. Israeli, targeting US hospital systems.", "funding": "$48.8M Series B", "product": "AI BCI for stroke recovery", "fda_status": "Breakthrough Designation", "us_signals": "FDA breakthrough designation, US hospital partnerships", "last_contacted": "2026-05-27", "email_body": "Subject: US market entry partnership \u2014 BrainQ\n\nHi Yotam,\n\nBrainQ's FDA breakthrough designation for stroke recovery BCI \u2014 that's a US market opener. Most Israeli neurotech companies don't realize how much the US reimbursement landscape changes the commercial calculus once you're inside a hospital system.\n\nI'm a US-native MBA based in Madrid who helps neurotech companies like yours establish US distribution. My AI-powered prospecting system identifies which US hospital networks are actively building stroke and neurorehab programs \u2014 so we can target the right partners from day one.\n\nWould a 20-min call this week make sense to map out your US entry options?\n\nBest,\nJordan Hays\n"}, {"company_name": "Neuroelectrics", "company_country": "Spain", "company_website": "https://neuroelectrics.com", "contact_name": "Ana Maiques", "contact_email": "ana.maiques@neuroelectrics.com", "contact_phone": "+34 932 540 366", "subject_line": "US market entry partnership \u2014 Neuroelectrics", "status": "pending", "sent_date": null, "reply_date": null, "notes": "$35.9M raised. tDCS for epilepsy and brain research. Spanish company with strong US research hospital relationships (Harvard, UCLA).", "funding": "$35.9M raised", "product": "tDCS / transcranial stimulation", "fda_status": "None (research use)", "us_signals": "Partnerships with Harvard, UCLA research programs", "last_contacted": "2026-05-26", "email_body": "Subject: US market entry partnership \u2014 Neuroelectrics\n\nHi Ana,\n\nNeuroelectrics has established relationships with Harvard and UCLA research programs \u2014 the question is whether you're ready to move from research partnerships to commercial US distribution.\n\nI'm a US-native MBA based in Madrid with a specific focus on neurotech US market entry. I know the difference between selling to research institutions vs. commercial healthcare networks \u2014 and the path is very different for each.\n\nHappy to map out what a US commercial expansion looks like for Neuroelectrics specifically. 20 minutes?\n\nBest,\nJordan Hays\n"}, {"company_name": "Flow Neuroscience", "company_country": "Sweden", "company_website": "https://flowneuroscience.com", "contact_name": "Daniel M\u00e5nsson", "contact_email": null, "contact_phone": null, "subject_line": "US distribution partnership \u2014 Flow Neuroscience", "status": "pending", "sent_date": null, "reply_date": null, "notes": "FDA cleared Dec 2025 \u2014 first at-home tDCS for depression. Sweden-based. Series status unclear. Significant US market entry momentum.", "funding": "Undisclosed (Series unknown)", "product": "At-home tDCS for depression", "fda_status": "FDA cleared Dec 2025", "us_signals": "FDA cleared for at-home use, US market entry imminent", "last_contacted": "2026-05-27", "email_body": "Subject: US distribution partnership \u2014 Flow Neuroscience\n\nHi Daniel,\n\nFDA clearance for at-home tDCS for depression \u2014 that's a real milestone. The US mental health market is wide open for non-pharma, non-invasive device interventions, and you've cleared the regulatory hurdle.\n\nThe challenge now isn't the product \u2014 it's the distribution. US mental health provider networks, telehealth platforms, and insurance reimbursement paths are a completely different game from Europe.\n\nI'm a US-native MBA based in Madrid who helps neurotech companies establish US commercial channels. I have specific relationships with US mental health providers and telehealth platforms actively looking for FDA-cleared devices like yours.\n\nOpen to a 20-min call this week to map the opportunity?\n\nBest,\nJordan Hays\n"}, {"company_name": "GrayMatters Health", "company_country": "Israel", "company_website": "https://graymattershealth.com", "contact_name": "Oded Kraft", "contact_email": null, "contact_phone": null, "subject_line": "US Veterans market entry \u2014 GrayMatters Health", "status": "pending", "sent_date": null, "reply_date": null, "notes": "FDA cleared. tBSG device for PTSD/depression. Israeli. Targeting US Veterans Affairs (VA) system \u2014 high-value but complex government channel.", "funding": "Undisclosed", "product": "tBSG for PTSD/depression", "fda_status": "FDA cleared", "us_signals": "FDA cleared, targeting VA and military health systems", "last_contacted": "2026-05-26", "email_body": "Subject: US Veterans market entry \u2014 GrayMatters Health\n\nHi Oded,\n\nGrayMatters Health cleared by FDA for tBSG treatment of PTSD and depression \u2014 and you're targeting the VA system. That's a high-value, high-complexity channel that most companies underestimate.\n\nThe US Veterans Affairs procurement process is a distinct discipline \u2014 different stakeholders, different timelines, different compliance requirements than commercial healthcare.\n\nI help neurotech companies navigate exactly these government channels. Happy to map out what a VA market entry strategy looks like for GrayMatters. 20 minutes?\n\nBest,\nJordan Hays\n"}];
let filter = 'all';
let country = 'all';

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
}

function render() {
  const counts = { total: 0, pending: 0, sent: 0, replied: 0, done: 0 };
  document.getElementById('cards').innerHTML = '';

  DATA.forEach((c, i) => {
    counts.total++;
    counts[c.status] = (counts[c.status] || 0) + 1;
    if (filter !== 'all' && c.status !== filter) return;
    if (country !== 'all' && c.company_country !== country) return;

    const statusCls = 'tag tag-' + (c.status||'pending');
    const countryCls = 'tag tag-' + (c.company_country||'').toLowerCase();
    const funding = c.funding ? '<span>' + escapeHtml(c.funding) + '</span>' : '';
    const fda = (c.fda_status && c.fda_status !== 'None') ? '<span>FDA: ' + escapeHtml(c.fda_status) + '</span>' : '';
    const last = c.last_contacted ? '<span>Last: ' + escapeHtml(c.last_contacted) + '</span>' : '';
    const contact = c.contact_email ? '<div class="contact">Contact: ' + escapeHtml(c.contact_email) + (c.contact_phone ? ' · ' + escapeHtml(c.contact_phone) : '') + '</div>' : '';
    const emailBody = c.email_body ? c.email_body.replace(/</g,'<').replace(/>/g,'>').replace(/\n/g,'<br>') : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header" onclick="toggle(\x27 + i + '\x27)">
        <div>
          <div class="company">\x3cimg width="14" height="14" style="vertical-align:middle;margin-right:6px"\x3e' + escapeHtml(c.company_name) + '</div>
          <div class="meta">
            <span class="' + countryCls + '">' + escapeHtml(c.company_country) + '</span>
            <span class="' + statusCls + '">' + escapeHtml(c.status||'pending') + '</span>
            ' + funding + ' ' + fda + ' ' + last + '
          </div>
        </div>
        <div style="color:#444;font-size:18px" id="arrow-\x27 + i + ''">\u25b8</div>
      </div>
      <div class="card-body" id="body-' + i + ''">
        <div class="email-block">
          <div class="subject">' + escapeHtml(c.subject_line || '') + '</div>
          ' + emailBody + '
        </div>
        ' + contact + '
        <div class="actions">
          <button class="action-btn" onclick="setStatus(' + i + '','sent')">\u2713 Sent</button>
          <button class="action-btn" onclick="setStatus(' + i + '','replied')">\u2190 Replied</button>
          <button class="action-btn done" onclick="setStatus(' + i + '','done')">\u2713 Done</button>
        </div>
      </div>
    `;
    document.getElementById('cards').appendChild(card);
  });

  document.getElementById('s-total').textContent = counts.total;
  document.getElementById('s-pending').textContent = counts.pending;
  document.getElementById('s-sent').textContent = counts.sent || 0;
  document.getElementById('s-replied').textContent = counts.replied || 0;
  document.getElementById('s-done').textContent = counts.done || 0;

  if (!document.getElementById('cards').children.length) {
    document.getElementById('cards').innerHTML = '<div class="no-results">No companies match this filter.</div>';
  }
}

function toggle(i) {
  const body = document.getElementById('body-' + i);
  const arrow = document.getElementById('arrow-' + i);
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    arrow.textContent = '\u25b8';
  } else {
    body.classList.add('open');
    arrow.textContent = '\u25be';
  }
}

function setStatus(i, status) {
  DATA[i].status = status;
  if (status === 'sent' && !DATA[i].sent_date) DATA[i].sent_date = new Date().toISOString().split('T')[0];
  if (status === 'replied' && !DATA[i].reply_date) DATA[i].reply_date = new Date().toISOString().split('T')[0];
  localStorage.setItem('neuro_outreach', JSON.stringify(DATA));
  render();
}

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.querySelectorAll('.filter-btn[data-country]').forEach(btn => {
  btn.addEventListener('click', () => {
    country = btn.dataset.country;
    document.querySelectorAll('.filter-btn[data-country]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

render();
</script>
</body>
</html>
